name: Release

# Publishing a GitHub release builds the signed APK and attaches it. 
# The app version comes from the tag (v1.2.3 becomes 1.2.3), so a release can never disagree with
# what the app reports about itself.

on:
  release:
    types: [published]

jobs:
  apk:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.44.6
          cache: true

      - name: Restore the signing identity
        working-directory: app
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/upload-keystore.jks
          cat > android/key.properties <<EOF
          storePassword=$STORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=upload-keystore.jks
          EOF

      - name: Build the signed APK
        working-directory: app
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # The build number comes from pubspec.yaml, NOT the workflow run
          # counter: dev builds side-loaded during testing carry the pubspec
          # number, and a release with a lower versionCode is a downgrade
          # Android refuses to install over them.
          BUILD_NUMBER="$(sed -n 's/^version:.*+//p' pubspec.yaml)"
          flutter pub get
          flutter build apk --release \
            --build-name="$VERSION" \
            --build-number="$BUILD_NUMBER"
          mv build/app/outputs/flutter-apk/app-release.apk \
             "kiosk-satellite-${GITHUB_REF_NAME}.apk"

      - name: Attach the APK to the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "$GITHUB_REF_NAME" \
            "app/kiosk-satellite-${GITHUB_REF_NAME}.apk" --clobber
