name: kiosk_satellite
description: "Modern kiosk browser for Home Assistant — companion app for Voice Satellite."
publish_to: 'none'

version: 0.1.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # WebView + JS bridge
  flutter_inappwebview: ^6.1.5

  # Screen / device
  screen_brightness: ^2.1.0
  wakelock_plus: ^1.2.10
  battery_plus: ^6.2.1
  device_info_plus: ^11.3.0
  package_info_plus: ^8.1.2

  # Remote management server
  shelf: ^1.4.2
  shelf_web_socket: ^3.0.0
  web_socket_channel: ^3.0.2

  # Home Assistant client
  http: ^1.3.0

  # Persistence
  shared_preferences: ^2.5.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
