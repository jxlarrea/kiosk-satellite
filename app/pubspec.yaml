name: kiosk_satellite
description: "Modern kiosk browser for Home Assistant — companion app for Voice Satellite."
publish_to: 'none'

version: 0.5.0-beta+29

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # WebView + JS bridge. Beta needed: 6.1.x's Android gradle file is
  # incompatible with the AGP 9 the current Flutter template uses.
  flutter_inappwebview: ^6.2.0-beta.3

  # Screen / device
  screen_brightness: ^2.1.0
  wakelock_plus: ^1.2.10
  battery_plus: ^6.2.1
  device_info_plus: ^11.3.0
  package_info_plus: ^8.1.2

  # Remote management server
  shelf: ^1.4.2
  shelf_web_socket: ^3.0.0
  web_socket_channel: ^3.0.2

  # Home Assistant client
  http: ^1.3.0

  # Persistence
  shared_preferences: ^2.5.2

  # HMAC for stateless remote-admin tokens (survive app restarts)
  crypto: ^3.0.6
  file_picker: ^8.1.2
  flutter_svg: ^2.0.10
  image_picker: ^1.1.2
  video_player: ^2.9.2

  # Share sheet (console log export)
  share_plus: ^10.1.4

  # Runtime permissions (mic for Voice Satellite, camera for motion)
  permission_handler: ^11.3.1

  # Native wake-word inference: ONNX runtime (mic capture is a platform
  # channel in android/, to avoid third-party AGP-9 build breakage).
  # ffi backs the zero-copy tensor I/O in vsww/ort_tensor_io.dart.
  onnxruntime: ^1.4.1
  ffi: ^2.1.0
  path_provider: ^2.1.5
  tflite_flutter: ^0.12.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

# Launcher icons for both platforms, generated from the master art in
# ../assets/icons (run: dart run flutter_launcher_icons). The adaptive
# layers are the designed ones, not derived — Android composes them.
flutter_launcher_icons:
  android: true
  image_path_android: ../assets/icons/rounded/icon_1024.png
  adaptive_icon_background: ../assets/icons/google/adaptive/ic_launcher_background.png
  adaptive_icon_foreground: ../assets/icons/google/adaptive/ic_launcher_foreground_scaled.png
  adaptive_icon_monochrome: ../assets/icons/google/adaptive/ic_launcher_monochrome_scaled.png
  ios: true
  image_path_ios: ../assets/icons/apple/appstore_1024.png
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/remote-ui/index.html
    - assets/screensaver/index.html
    - assets/branding/icon.png
    - assets/branding/mark.png
    - assets/branding/mark_light.png
    - assets/branding/hacs.svg
  fonts:
    # Rubik (SIL Open Font License) — an open geometric sans that gives the
    # clock the clean, friendly feel of Google Sans without the licensing.
    # The TTF carries a `wght` axis, so w300/w400 in TextStyle map to it.
    - family: Rubik
      fonts:
        - asset: assets/fonts/Rubik.ttf
