<script>
  // Theme before first paint (no flash); the full logic lives at the bottom.
  {
    const p = localStorage.getItem('ks_theme');
    document.documentElement.dataset.theme =
      p === 'dark' || p === 'light' ? p
        : matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
  }
</script>
<style>
  /* Kiosk Satellite brand palette, shared with the app's own theme (see
     lib/ui/theme.dart): sage green primary, teal accent, ochre warning, rust
     error. Exact values on the dark background; darkened a step for text on
     the light one. --primary is the text/border accent, --primary-fill the
     solid-fill tone — one and the same in dark. */
  :root {
    color-scheme: light;
    --bg: #f5f4f2; --surface: #ffffff; --surface-2: #edeae5;
    --border: #e2dfd9; --divider: #eae7e1;
    --text: #212327; --muted: #6c7076;
    --primary: #56814f; --primary-fill: #749c6f; --primary-ink: #ffffff;
    --primary-soft: #e3eae1;
    --accent: #44686c;
    --ok: #56814f; --warn: #9c742a; --error: #a9501f; --debug: #9a9da3;
    --radius: 24px; --radius-sm: 10px;
  }
  :root[data-theme="dark"] {
    color-scheme: dark;
    --bg: #202124; --surface: #2a2b2f; --surface-2: #37383d;
    --border: #3c3e43; --divider: #3c3e43;
    --text: #e8eaed; --muted: #9aa0a6;
    --primary: #749c6f; --primary-fill: #749c6f; --primary-ink: #ffffff;
    --primary-soft: #333f31;
    --accent: #7aa6aa;
    --ok: #749c6f; --warn: #ce9c3e; --error: #d97e4c; --debug: #7d8188;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    background: var(--bg); color: var(--text);
    font: 15px/1.5 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  button { font: inherit; cursor: pointer; }
  input, select { font: inherit; }
  input[type=range], input[type=checkbox] { accent-color: var(--primary-fill); }
  .hidden { display: none !important; }

  /* Login */
  #login { min-height: 100%; display: grid; place-items: center; padding: 24px; }
  .login-card {
    width: 100%; max-width: 360px; background: var(--surface);
    border-radius: var(--radius); padding: 32px; text-align: center;
  }
  .logo { display: block; margin: 0 auto; }
  .login-card h1 { font-size: 20px; font-weight: 700; margin: 12px 0 4px; }
  .login-card p { color: var(--muted); margin: 0 0 24px; font-size: 14px; }
  .field { width: 100%; padding: 13px 15px; margin-bottom: 12px;
    background: var(--surface-2); border: 1px solid var(--border);
    border-radius: var(--radius-sm); color: var(--text); }
  .field:focus { outline: none; border-color: var(--primary); }
  .btn-primary { width: 100%; padding: 13px; background: var(--primary-fill);
    color: var(--primary-ink); border: none; border-radius: var(--radius-sm);
    font-weight: 600; }
  .btn-primary:hover { filter: brightness(1.06); }
  .btn-primary:active { transform: translateY(1px); }
  .msg-error { color: var(--error); font-size: 14px; margin-top: 12px; min-height: 18px; }

  /* App shell: a One UI split, mirroring the device's settings — the nav is
     a rail that stays put on the left, the content pane scrolls. */
  #app { min-height: 100%; }
  .shell { display: flex; min-height: 100vh; }
  #sidebar { width: 320px; flex: none; display: flex; flex-direction: column;
    position: sticky; top: 0; height: 100vh;
    background: var(--bg); border-right: 1px solid var(--border); }
  .brand { display: flex; align-items: center; gap: 12px; padding: 22px 24px 18px; }
  .brand-text { min-width: 0; }
  .brand-title { font-size: 18px; font-weight: 700; line-height: 1.25; }
  .brand-sub { font-size: 12.5px; color: var(--muted);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  /* The bare brand mark, cropped of its safe-zone padding. Light theme
     uses the variant with a teal body — the mark itself is white and would
     vanish — while the bubble keeps its three brand dots in both. */

  .brand-title .dot { display: inline-block; margin-left: 4px; }
  .dot { flex: none; width: 9px; height: 9px; border-radius: 50%; background: var(--debug); }
  .dot.on { background: var(--ok); }
  .dot.off { background: var(--error); }

  /* The rail rows: icon discs cycling the brand accents (the same language
     as the device's category icons), semibold titles, muted subtitles, and
     a large rounded highlight on the selected row. */
  nav#tabs { flex: 1; overflow-y: auto; padding: 4px 12px 12px;
    display: flex; flex-direction: column; gap: 4px; }
  nav#tabs button { display: flex; align-items: center; gap: 14px;
    padding: 11px 14px; border: none; border-radius: 18px;
    background: transparent; color: var(--text); text-align: left; }
  nav#tabs button:hover { background: var(--surface); }
  nav#tabs button.active { background: var(--surface-2); }
  .disc { flex: none; width: 38px; height: 38px; border-radius: 50%;
    display: grid; place-items: center; color: #fff; }
  .disc svg { width: 19px; height: 19px; }
  .d1 { background: var(--primary); }
  .d2 { background: var(--accent); }
  .d3 { background: var(--warn); }
  .d4 { background: var(--error); }
  .nav-text { min-width: 0; display: flex; flex-direction: column; }
  .nav-title { font-size: 15.5px; font-weight: 600; }
  .nav-sub { font-size: 12.5px; color: var(--muted);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .side-foot { padding: 10px 16px 14px; }
  .foot-stats { display: flex; gap: 12px; padding: 0 8px 10px; min-height: 29px; }
  .stat { color: var(--muted); font-size: 12.5px; font-variant-numeric: tabular-nums; }
  .device { color: var(--muted); font-size: 13px; }
  .foot-actions { display: flex; gap: 8px; }
  .foot-actions #logoutBtn { flex: 1; }

  .btn-ghost { background: transparent; border: 1px solid var(--border);
    color: var(--text); border-radius: var(--radius-sm); padding: 7px 12px; }
  .btn-ghost:hover { border-color: var(--primary); color: var(--primary); }
  #themeBtn { display: inline-flex; align-items: center; justify-content: center;
    padding: 7px 9px; }
  #themeBtn svg { display: block; }

  /* Phone top bar; hidden on wide screens where the rail is always there. */
  .mobilebar { display: none; }
  .hamburger { background: transparent; border: 1px solid var(--border);
    color: var(--text); border-radius: var(--radius-sm); padding: 6px 11px;
    font-size: 17px; line-height: 1; cursor: pointer; }
  .hamburger:hover { border-color: var(--primary); }
  .nav-backdrop { display: none; position: fixed; inset: 0;
    background: rgba(0, 0, 0, .5); z-index: 19; }

  main { flex: 1; min-width: 0; padding: 20px 28px 28px; }
  main > * { max-width: 880px; }
  #pageTitle { font-size: 26px; font-weight: 700; margin: 4px 0 18px 4px; }

  .tab { display: none; }
  .tab.active { display: block; }

  /* Cards: One UI section masks, mirroring the device — borderless, large
     radius, headed from outside by a small primary-tinted title. */
  .card-title { font-size: 13.5px; font-weight: 600; color: var(--primary);
    margin: 2px 20px 10px; }
  .card { background: var(--surface); border-radius: var(--radius);
    padding: 7px 20px; margin-bottom: 18px; }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 10px; padding: 10px 0; }
  .action { padding: 12px; background: var(--surface-2); border: 1px solid transparent;
    border-radius: var(--radius-sm); color: var(--text); text-align: center; }
  .action:hover { border-color: var(--primary-fill); }

  /* Rows: the device's list rhythm — a readable medium-weight title over a
     clearly quieter description, hairlines between rows and never after the
     last (the card's own padding insets them). */
  .row { display: flex; align-items: center; gap: 12px; padding: 13px 0;
    border-bottom: 1px solid var(--divider); }
  .row:last-child { border-bottom: none; }
  .row .info { flex: 1; min-width: 0; }
  .row .info .name { font-size: 16px; font-weight: 500; }
  .row .info .desc { color: var(--muted); font-size: 13.5px; }
  .row input[type=text], .row input[type=password], .row input[type=number], .row select {
    background: var(--surface-2); border: 1px solid var(--border);
    color: var(--text); border-radius: var(--radius-sm); padding: 8px 11px;
    max-width: 220px; }
  .row input:focus, .row select:focus { outline: none; border-color: var(--accent); }
  .switch { position: relative; width: 46px; height: 26px; flex: none; }
  .switch input { opacity: 0; width: 0; height: 0; }
  .slider { position: absolute; inset: 0; background: var(--surface-2);
    border: 1px solid var(--border); border-radius: 26px; transition: .2s; }
  .slider::before { content: ""; position: absolute; width: 18px; height: 18px;
    left: 3px; top: 3px; background: var(--muted); border-radius: 50%; transition: .2s; }
  .switch input:checked + .slider { background: var(--primary-fill); border-color: var(--primary-fill); }
  .switch input:checked + .slider::before { transform: translateX(20px); background: #fff; }

  .shot-wrap { position: relative; border-radius: 14px; overflow: hidden;
    background: var(--surface-2); aspect-ratio: 16/10; display: grid;
    place-items: center; margin-top: 10px; }
  .shot-wrap img { width: 100%; height: 100%; object-fit: contain; }
  .shot-wrap .placeholder { color: var(--muted); }

  .console { background: var(--surface); border-radius: var(--radius);
    height: 62vh; overflow-y: auto; padding: 14px 20px;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12.5px; }
  .line { white-space: pre-wrap; word-break: break-word; padding: 1px 0; }
  .line .ts { color: var(--debug); }
  .line.log { color: var(--text); } .line.error { color: var(--error); }
  .line.warn { color: var(--warn); } .line.debug { color: var(--debug); }
  .line.tip { color: var(--primary); }
  .line.info { color: var(--text); }

  .toolbar { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
  .toolbar .spacer { flex: 1; }
  label.inline { display: inline-flex; align-items: center; gap: 6px; color: var(--muted); font-size: 13px; }
  .spacer { flex: 1; }

  /* Phone: the rail becomes a drawer behind a slim top bar. */
  @media (max-width: 900px) {
    .mobilebar { display: flex; align-items: center; gap: 10px;
      padding: 10px 14px; background: var(--bg);
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 10; }
    .mtitle { font-weight: 700; }
    .shell { display: block; min-height: 0; }
    #sidebar { position: fixed; left: 0; top: 0; bottom: 0; height: auto;
      z-index: 20; width: 300px; max-width: 84vw;
      transform: translateX(-100%); transition: transform .22s ease; }
    #sidebar.open { transform: none; box-shadow: 0 10px 40px rgba(0, 0, 0, .45); }
    .nav-backdrop.show { display: block; }
    main { padding: 14px 16px 20px; }
    #pageTitle { font-size: 22px; margin-bottom: 12px; }
  }

  /* On phones, reflow each row so the name and its control share the top line
     and the description spans full width below both — instead of a cramped
     name+description column beside the control. Placed after the base .row
     rules so this display:grid wins (media queries add no specificity).
     `display: contents` promotes the .info's name/desc into the row's grid. */
  @media (max-width: 640px) {
    .row { display: grid; grid-template-columns: 1fr auto; align-items: center;
      column-gap: 12px; row-gap: 3px;
      grid-template-areas: "name control" "desc desc"; }
    .row .info { display: contents; }
    .row .info .name { grid-area: name; }
    .row .info .desc { grid-area: desc; }
    .row > :not(.info) { grid-area: control; justify-self: end; }
    /* Keep controls from crowding the name off its line. Numbers hold short
       values, so they get a tight cap; text/selects a little more. */
    .row input[type=text], .row input[type=password], .row select { max-width: 48vw; }
    .row input[type=number] { max-width: 90px; }
  }
</style>

    </div>

    <!-- Console -->
    <div class="tab" id="tab-console">
      <div class="toolbar">
        <span class="spacer"></span>
        <button class="btn-ghost" id="clearConsole">Clear</button>
      </div>
      <div class="console" id="consoleOut"></div>
    </div>

    <!-- Logs -->
    <div class="tab" id="tab-logs">
      <div class="toolbar"><span class="spacer"></span>
        <button class="btn-ghost" id="refreshLogs">Refresh</button></div>
      <div class="console" id="logsOut"></div>
    </div>
    </main>
  </div>
</section>

<script>
const $ = (s) => document.querySelector(s);
const state = { token: localStorage.getItem('ks_token'), ws: null, autoShotTimer: null };

/* ---- Theme ---- */
// Follows the OS by default; the header button cycles auto → dark → light and
// remembers. The head script applies the same choice before first paint.
const themeMedia = matchMedia('(prefers-color-scheme: dark)');
// The button shows the *preference* (auto / dark / light), not the resolved
// theme — auto has its own face so "following the OS" stays visible.
const THEME_ICONS = {
  auto: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="9"/><path d="M12 3a9 9 0 0 1 0 18z" fill="currentColor" stroke="none"/></svg>',
  dark: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>',
  light: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2m0 16v2M4.9 4.9l1.4 1.4m11.4 11.4 1.4 1.4M2 12h2m16 0h2M4.9 19.1l1.4-1.4m11.4-11.4 1.4-1.4"/></svg>',
};
function applyTheme() {
  const pref = localStorage.getItem('ks_theme') || 'auto';
  const dark = pref === 'dark' || (pref === 'auto' && themeMedia.matches);
  document.documentElement.dataset.theme = dark ? 'dark' : 'light';
  const btn = $('#themeBtn');
  btn.innerHTML = THEME_ICONS[pref];
  btn.title = `Theme: ${pref}`;
  btn.setAttribute('aria-label', `Theme: ${pref}`);
}
$('#themeBtn').addEventListener('click', () => {
  const order = ['auto', 'dark', 'light'];
  const pref = localStorage.getItem('ks_theme') || 'auto';
  localStorage.setItem('ks_theme', order[(order.indexOf(pref) + 1) % order.length]);
  applyTheme();
});
themeMedia.addEventListener('change', applyTheme);
applyTheme();

async function api(path, opts = {}) {
  const res = await fetch(path, {
    ...opts,
    headers: { ...(opts.headers || {}), Authorization: `Bearer ${state.token}` },
  });
  if (res.status === 401) { logout(); throw new Error('unauthorized'); }
  return res;
}
const cmd = (name, params = {}) =>
  api(`/api/commands/${name}`, { method: 'POST', body: JSON.stringify(params) })
    .then((r) => r.json());

/* ---- Auth ---- */
async function login() {
  $('#loginError').textContent = '';
  const res = await fetch('/api/login', {
    method: 'POST', body: JSON.stringify({ password: $('#password').value }),
  });
  if (!res.ok) { $('#loginError').textContent = 'Invalid password'; return; }
  state.token = (await res.json()).token;
  localStorage.setItem('ks_token', state.token);
  start();
}
function logout() {
  state.token = null; localStorage.removeItem('ks_token');
  if (state.ws) { state.ws.onclose = null; state.ws.close(); state.ws = null; }
  clearInterval(state.autoShotTimer);
  $('#app').classList.add('hidden'); $('#login').classList.remove('hidden');
}

/* ---- Tabs ---- */
// Addressable, because this is a page in a browser and behaves like one: the
// tab lives in the URL, so a reload keeps you where you were, Back goes back,
// and #settings can be bookmarked or handed to someone. Everything is served
// from one root, so without this a reload always dumped you on the dashboard.
const TABS = ['dashboard', 'browser', 'webcontent', 'screen', 'screensaver',
  'homeassistant', 'remote', 'device', 'console', 'logs'];
const TAB_TITLES = {
  dashboard: 'Dashboard', browser: 'Web Browsing', webcontent: 'Web Content',
  screen: 'Screen', screensaver: 'Screensaver',
  homeassistant: 'Home Assistant', remote: 'Remote Administration',
  device: 'Device', console: 'Console', logs: 'Logs',
};

function showTab(name, { push = true } = {}) {
  const tab = TABS.includes(name) ? name : 'dashboard';
  document.querySelectorAll('#tabs button').forEach((b) =>
    b.classList.toggle('active', b.dataset.tab === tab));
  document.querySelectorAll('.tab').forEach((t) =>
    t.classList.toggle('active', t.id === `tab-${tab}`));
  $('#pageTitle').textContent = TAB_TITLES[tab];
  if (push && location.hash.slice(1) !== tab) location.hash = tab;
  if (tab === 'logs') loadLogs();
  if (tab === 'device') loadDeviceInfo();
}

// Mobile drawer: the hamburger toggles the nav in/out; the backdrop and picking
// a tab close it. On wide screens the nav is a normal bar and these are inert
// (the .open/.show styles live only inside the mobile media query).
function setNav(open) {
  $('#sidebar').classList.toggle('open', open);
  $('#navBackdrop').classList.toggle('show', open);
  $('#navToggle').setAttribute('aria-expanded', open ? 'true' : 'false');
}
$('#navToggle').addEventListener('click', () =>
  setNav(!$('#tabs').classList.contains('open')));
$('#navBackdrop').addEventListener('click', () => setNav(false));

$('#tabs').addEventListener('click', (e) => {
  const btn = e.target.closest('button');
  if (btn) { showTab(btn.dataset.tab); setNav(false); }
});

// Back/forward, and an address typed by hand.
window.addEventListener('hashchange', () => showTab(location.hash.slice(1), { push: false }));

/* ---- Dashboard ---- */
document.querySelectorAll('.action[data-cmd]').forEach((b) =>
  b.addEventListener('click', () => cmd(b.dataset.cmd)));
$('#brightness').addEventListener('input', (e) =>
  $('#brightnessValue').textContent = `${e.target.value}%`);
$('#brightness').addEventListener('change', (e) =>
  cmd('setBrightness', { level: e.target.value / 100 }));
$('#loadUrlBtn').addEventListener('click', () => {
  const url = $('#urlInput').value.trim();
  if (url) cmd('loadUrl', { url });
});
$('#refreshShot').addEventListener('click', loadScreenshot);
$('#autoShot').addEventListener('change', (e) => {
  clearInterval(state.autoShotTimer);
  if (e.target.checked) { loadScreenshot(); state.autoShotTimer = setInterval(loadScreenshot, 3000); }
});
async function loadScreenshot() {
  try {
    const res = await api('/api/screenshot');
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    const wrap = $('#shotWrap');
    let img = wrap.querySelector('img');
    if (!img) { wrap.innerHTML = ''; img = document.createElement('img'); wrap.appendChild(img); }
    const old = img.src; img.src = url; if (old) URL.revokeObjectURL(old);
  } catch (_) { /* ignore */ }
}

/* ---- Settings ---- */
// One tab per category, mirroring the device's settings rail. Voice
// Satellite shares the Home Assistant tab, as it shares that pane on the
// device.
const CATEGORY_TABS = [
  ['tab-browser', ['Browser']],
  ['tab-webcontent', ['Web Content']],
  ['tab-screen', ['Screen']],
  ['tab-screensaver', ['Screensaver']],
  ['tab-homeassistant', ['Home Assistant', 'Voice Satellite']],
  ['tab-remote', ['Remote']],
  ['device-settings', ['Device']],
];

async function loadSettings() {
  const { settings } = await (await api('/api/settings')).json();

  // A setting can declare that it only means anything while another one is on
  // (dependsOn). The device hides those rows; so must we, or the two disagree
  // about the same device — and the remote copy is the one that gets believed
  // by whoever is not in the room. Transitive, matching the device: a row is
  // shown only if its dependency holds and that dependency is itself shown.
  const byKey = Object.fromEntries(settings.map((s) => [s.key, s]));
  const visible = (s) => {
    if (s.hidden) return false;
    if (!s.dependsOn) return true;
    const dep = byKey[s.dependsOn];
    if (!dep) return true;
    return dep.value === (s.dependsOnValue ?? true) && visible(dep);
  };

  // The Home Assistant Media mode only offers itself with HA connected.
  state.haConfigured = (byKey['ha.url']?.value || '') !== '' &&
    byKey['ha.token']?.value === '__set__';

  const byCat = {};
  settings.filter(visible).forEach((s) => (byCat[s.category] ??= []).push(s));

  const render = (root, cats) => {
    root.innerHTML = '';
    if (!cats.length) {
      root.innerHTML = '<div class="card"><div class="desc" style="color:var(--muted); padding:12px 0">Nothing here.</div></div>';
      return;
    }
    // One UI shape, mirroring the device's settings panes: a small heading
    // floats above each rounded card, and settings sharing a `section` get a
    // card of their own (e.g. the motion controls under "Motion Detection").
    for (const cat of cats) {
      const base = cat === cats[0] ? null : cat;
      let heading = base;
      let rows = [];
      const flush = () => {
        if (!rows.length) return;
        if (heading) {
          const h = document.createElement('h2');
          h.className = 'card-title';
          h.textContent = heading;
          root.appendChild(h);
        }
        const card = document.createElement('div');
        card.className = 'card';
        rows.forEach((r) => card.appendChild(r));
        root.appendChild(card);
        rows = [];
      };
      byCat[cat].forEach((s) => {
        const want = s.section || base;
        if (want !== heading) { flush(); heading = want; }
        rows.push(settingRow(s));
      });
      flush();
    }
  };

  for (const [tabId, cats] of CATEGORY_TABS) {
    render(document.getElementById(tabId), cats.filter((c) => byCat[c]));
  }

  // The Device ID, mirroring the device's Settings → Device card. Not a
  // setting (derived, never chosen — see DeviceManager.deviceId), so it is
  // appended to the card rather than declared with the settings.
  const deviceId = state.device?.deviceId;
  const deviceCard = document.createElement('div');
  deviceCard.className = 'card';
  if (deviceId) {
    $('#device-settings').appendChild(deviceCard);
    const row = readOnlyRow('Device ID', 'Click to copy.', deviceId);
    row.querySelector('span').style.fontFamily = 'ui-monospace, monospace';
    row.style.cursor = 'pointer';
    row.addEventListener('click', async () => {
      try {
        await navigator.clipboard.writeText(deviceId);
        row.querySelector('.desc').textContent = 'Copied.';
        setTimeout(
          () => (row.querySelector('.desc').textContent = 'Click to copy.'),
          1500);
      } catch (_) { /* clipboard needs https or localhost; row still shows */ }
    });
    deviceCard.appendChild(row);
  }
  // The on-device settings screen shows the wake-word config inherited from
  // Voice Satellite under the same heading. This tab mirrors it.
  await loadWakeWord();
}

/* ---- Voice Satellite wake word (read-only, pushed by the VS card) ---- */
// Not a setting: nothing here is ours to change. The card owns the engine, the
// wake words and the sensitivity, and pushes them to this device. We report.
async function loadWakeWord() {
  let s;
  try {
    const res = await cmd('getWakeWordState');
    if (!res.ok) return;
    s = res.data;
  } catch { return; }

  const wrap = document.createElement('div');
  wrap.id = 'wakeWordCard';
  const h = document.createElement('h2');
  h.className = 'card-title';
  h.textContent = 'Wake word';
  const card = document.createElement('div');
  card.className = 'card';
  wrap.append(h, card);

  // Status first: it is the answer to "is this thing working?".
  const status = document.createElement('div');
  status.className = 'row';
  const bad = ['micBlocked', 'micDeclined', 'micLost', 'modelsUnavailable', 'unavailable'];
  const dot = s.status === 'listening' ? 'var(--ok)'
    : bad.includes(s.status) ? 'var(--error)'
    : 'var(--muted)';
  status.innerHTML =
    `<div class="info"><div class="name">Status</div>` +
    `<div class="desc"></div></div>` +
    `<span style="color:${dot}; white-space:nowrap"></span>`;
  status.querySelector('.desc').textContent = s.statusLabel || '';
  status.querySelector('span').textContent = s.status || '';
  card.appendChild(status);

  // The way out, offered on exactly the terms the device decided — a blocked
  // mic needs the OS settings, a declined one only needs asking again. The
  // on-device settings screen shows the same two buttons off the same flags.
  if (s.canRetry) {
    const row = document.createElement('div'); row.className = 'row';
    const info = document.createElement('div'); info.className = 'info';
    info.innerHTML = `<div class="name">Recover</div><div class="desc"></div>`;
    // The status row above already carries the sentence; this one says what
    // the buttons will do about it.
    info.querySelector('.desc').textContent = s.needsAppSettings
      ? 'Open the app settings on the device and allow the microphone, then retry.'
      : 'Try starting the engine again.';
    row.appendChild(info);

    if (s.needsAppSettings) {
      const open = document.createElement('button');
      open.className = 'btn-ghost';
      open.textContent = 'Open app settings';
      // Puts the *device* on its settings screen; someone still has to tap
      // Allow there. That is the whole of the way back, so say so plainly.
      open.addEventListener('click', () => cmd('openAppSettings'));
      row.appendChild(open);
    }
    const retry = document.createElement('button');
    retry.className = 'btn-ghost';
    retry.textContent = 'Retry';
    retry.addEventListener('click', async () => {
      retry.disabled = true; retry.textContent = 'Retrying…';
      try { await cmd('retryWakeWord'); } catch {}
      retry.disabled = false; retry.textContent = 'Retry';
      loadWakeWord();
    });
    row.appendChild(retry);
    card.appendChild(row);
  }

  if (s.engineLabel) {
    card.appendChild(readOnlyRow('Engine', 'Running in Kiosk', s.engineLabel));
  }
  const words = (s.models || []).map((m) => m.wakeWord).filter(Boolean);
  if (words.length) {
    card.appendChild(readOnlyRow('Wake words', 'Running in Kiosk', words.join(', ')));
  }
  if (s.stopWord) {
    card.appendChild(readOnlyRow(
      'Stop word',
      s.stopWordAvailable ? 'Running in Kiosk' : 'Voice Satellite keeps this one in the browser',
      s.stopWord));
  }

  // Models are cached by URL, so re-publishing one on Home Assistant under the
  // same name is invisible to this device until the cache is dropped.
  const row = document.createElement('div'); row.className = 'row';
  const info = document.createElement('div'); info.className = 'info';
  info.innerHTML = `<div class="name">Cached models</div>` +
    `<div class="desc">Re-download from Home Assistant. Use after re-publishing a model.</div>`;
  row.appendChild(info);
  const btn = document.createElement('button');
  btn.className = 'btn-ghost';
  btn.textContent = 'Clear cache';
  btn.addEventListener('click', async () => {
    btn.disabled = true;
    btn.textContent = 'Clearing…';
    try {
      const r = await cmd('clearWakeWordModels');
      btn.textContent = r.ok ? `Cleared ${r.data.removed}` : 'Failed';
    } catch { btn.textContent = 'Failed'; }
    setTimeout(() => { btn.disabled = false; btn.textContent = 'Clear cache'; loadWakeWord(); }, 1200);
  });
  row.appendChild(btn);
  card.appendChild(row);

  const root = $('#tab-homeassistant');
  root.querySelector('#wakeWordCard')?.remove();
  root.appendChild(wrap);
  await loadPermissions();
}

/* ---- Device Info ---- */
// What this device is and what it is doing, read fresh each time the tab is
// opened. Everything here comes from the device itself; nothing is inferred
// from what we asked it to do earlier, because the interesting case is exactly
// when those two disagree.
async function loadDeviceInfo() {
  const root = $('#device-info');
  root.innerHTML = '<div class="card"><div class="desc" style="color:var(--muted)">Reading…</div></div>';

  const get = async (name, params = {}) => {
    try { const r = await cmd(name, params); return r.ok ? r.data : null; }
    catch { return null; }
  };

  const [info, settings, perms, wake, screenOn, motion, ua, det] = await Promise.all([
    api('/api/info').then((r) => r.json()).catch(() => null),
    api('/api/settings').then((r) => r.json()).catch(() => null),
    get('getSystemPermissions'),
    get('getWakeWordState'),
    get('isScreenOn'),
    get('getMotionEnabled'),
    // The page's own view of itself: the one thing only the WebView knows.
    get('evalJs', { code: 'navigator.userAgent' }),
    get('getDeviceDetails'),
  ]);

  const S = {};
  (settings?.settings || []).forEach((x) => (S[x.key] = x.value));
  const yn = (v) => (v === true ? 'on' : v === false ? 'off' : '—');
  const or = (v, alt = '—') => (v === null || v === undefined || v === '' ? alt : v);
  const mb = (b) => (b == null ? null : Math.round(b / 1048576));
  const pair = (free, total, unit) =>
    free == null || total == null ? '—' : `${free}/${total} ${unit}`;

  root.innerHTML = '';
  const card = (title, rows) => {
    const h = document.createElement('h2');
    h.className = 'card-title';
    h.textContent = title;
    root.appendChild(h);
    const c = document.createElement('div'); c.className = 'card';
    for (const [k, v] of rows) {
      if (v === undefined) continue;
      const row = document.createElement('div'); row.className = 'row';
      const info = document.createElement('div'); info.className = 'info';
      const n = document.createElement('div'); n.className = 'name'; n.textContent = k;
      info.appendChild(n); row.appendChild(info);
      const val = document.createElement('span');
      val.style.cssText = 'text-align:right; word-break:break-all; max-width:60%';
      val.textContent = String(v);
      row.appendChild(val);
      c.appendChild(row);
    }
    root.appendChild(c);
  };

  card('App', [
    ['App version', `${or(info?.appVersion)} (${or(info?.buildNumber, '—')})`],
    // Which build this is decides where its logs go: a release build reports
    // to this page and stays silent on logcat.
    ['Build', or(info?.buildMode)],
    ['Package', or(info?.package)],
    ['Start URL', or(S['browser.start_url'])],
    ['Current page', or(info?.currentUrl)],
    ['Kiosk mode', or(S['ha.kiosk_mode'])],
  ]);

  card('Hardware', [
    ['Device name', or(info?.name)],
    // The licensing identity — derived on the device, stable across
    // reinstalls (see DeviceManager.deviceId).
    ['Device ID', or(info?.deviceId)],
    ['Device model', det?.brand && det?.brand !== det?.manufacturer
      ? `${or(info?.model)} (${det.brand})` : or(info?.model)],
    ['Android version', `${or(info?.osVersion)}${info?.sdkInt ? ` (SDK ${info.sdkInt})` : ''}`],
    ['Android build', or(det?.androidBuild)],
    ['IPv4 address', or(info?.ip)],
    ['IPv6 addresses', or((info?.ipv6 || []).join(', '))],
    ['Battery level', info?.battery == null ? '—'
      : `${info.battery}%${info.charging ? ' (plugged)' : ''}`],
    ['Screen brightness', info?.brightness == null ? '—'
      : `${Math.round(info.brightness * 100)}% (${Math.round(info.brightness * 255)}/255)`],
    ['Screen status', yn(screenOn)],
    ['Screen size', det?.screen?.width == null ? '—'
      : `${det.screen.width}x${det.screen.height} px` +
        (det.screen.density ? ` @${det.screen.density}x` : '')],
    ['RAM (free/total)', pair(mb(det?.ram?.free), mb(det?.ram?.total), 'MB') +
      (det?.ram?.low ? ' — low' : '')],
    ['Internal storage (free/total)',
      pair(mb(det?.storage?.free), mb(det?.storage?.total), 'MB')],
  ]);

  card('Home Assistant', [
    ['Home Assistant URL', or(S['ha.url'])],
    ['Wake word detection', yn(S['wake_word.enabled'])],
    ['Wake word status', or(wake?.statusLabel)],
    ['Engine', or(wake?.engineLabel)],
    ['Wake words', or((wake?.models || []).map((m) => m.wakeWord).join(', '))],
    ['Stop word', or(wake?.stopWord)],
    ['Background listening', yn(S['wake_word.background'])],
    ['Motion detection', yn(motion)],
  ]);

  // Every permission that can actually fail, with what it is for — Fully lists
  // only the denied ones, but "granted" is exactly the claim you want to check
  // when something has gone quiet. The install-time normals are summarised
  // rather than listed: they cannot be denied, so a row each would be noise.
  const st = (v) => (v ? 'granted' : 'denied');
  card('Permissions', [
    ['Microphone', perms?.microphoneBlocked ? 'blocked'
      : st(perms?.microphone) + ' — wake word'],
    ['Camera', st(perms?.camera) + ' — motion detection'],
    ['Location', st(perms?.location) + ' — page geolocation'],
    ['Notifications', st(perms?.notification) + ' — listening notification'],
    ['Display over other apps', st(perms?.displayOverOtherApps) +
      ' — come forward on a wake word'],
    ['Unrestricted battery', st(perms?.batteryUnrestricted) +
      ' — keep the background listener alive'],
    ['Install-time', 'granted — internet, network state, wake lock, audio ' +
      'settings, boot, foreground service'],
  ]);

  card('Remote administration', [
    ['Port', or(S['remote.port'])],
    ['Web admin', `http://${or(info?.ip, '<device-ip>')}:${or(S['remote.port'], 2324)}`],
  ]);

  card('WebView', [
    // The system WebView, which updates itself independently of this app and
    // is the thing actually rendering the card.
    ['Provider', or(det?.webview?.package)],
    ['Version', or(det?.webview?.version)],
    ['User agent', or(ua)],
  ]);
}

/* ---- Required system permissions (read-only) ---- */
// The same rows the device's own settings screen shows, from the same read.
// Status only, and deliberately: these are Android dialogs and settings
// screens, so only someone at the device can give them. A permission granted
// from another room would not be much of a permission.
async function loadPermissions() {
  const root = $('#tab-homeassistant');
  root.querySelector('#permsCard')?.remove();

  let p;
  try {
    const res = await cmd('getSystemPermissions');
    if (!res.ok) return;
    p = res.data;
  } catch { return; }

  // With wake word detection off the card keeps detection in the browser,
  // which asks for the microphone itself — none of this applies.
  if (!p.required) return;

  const wrap = document.createElement('div');
  wrap.id = 'permsCard';
  const h = document.createElement('h2');
  h.className = 'card-title';
  h.textContent = 'Required system permissions';
  const card = document.createElement('div');
  card.className = 'card';
  wrap.append(h, card);

  const rows = [
    ['Microphone', p.microphone,
      'Wake word detection can hear you.',
      p.microphoneBlocked
        ? 'Blocked — Android will not ask again.'
        : 'Nothing is listening for the wake word.'],
  ];
  if (p.background) {
    rows.push(
      ['Display over other apps', p.displayOverOtherApps,
        'Can come forward when it hears you.',
        'The wake word is heard and nothing happens.'],
      ['Listening notification', p.notification,
        'The device shows that it is listening.',
        'It listens with nothing on screen to say so.'],
      ['Unrestricted battery', p.batteryUnrestricted,
        'Android will leave the listener running.',
        'The listener is stopped after a few hours.'],
    );
  }

  let anyMissing = false;
  for (const [name, granted, held, missing] of rows) {
    if (!granted) anyMissing = true;
    const row = document.createElement('div'); row.className = 'row';
    const info = document.createElement('div'); info.className = 'info';
    info.innerHTML = `<div class="name"></div><div class="desc"></div>`;
    info.querySelector('.name').textContent = name;
    info.querySelector('.desc').textContent = granted ? held : missing;
    row.appendChild(info);
    const state = document.createElement('span');
    state.style.cssText =
      `white-space:nowrap; color:${granted ? 'var(--ok)' : 'var(--error)'}`;
    state.textContent = granted ? 'Granted' : 'Missing';
    row.appendChild(state);
    card.appendChild(row);
  }

  if (anyMissing) {
    // Say where to go, since it cannot be done from here.
    const note = document.createElement('div');
    note.className = 'desc';
    note.style.cssText = 'margin-top:12px; color:var(--warn)';
    note.textContent =
      'Grant these on the device itself: swipe in from the left edge → ' +
      'Settings → Home Assistant → Required system permissions.';
    card.appendChild(note);
  }

  root.appendChild(wrap);
}

function readOnlyRow(name, desc, value) {
  const row = document.createElement('div'); row.className = 'row';
  const info = document.createElement('div'); info.className = 'info';
  info.innerHTML = `<div class="name"></div><div class="desc"></div>`;
  info.querySelector('.name').textContent = name;
  info.querySelector('.desc').textContent = desc;
  row.appendChild(info);
  const v = document.createElement('span');
  v.style.whiteSpace = 'nowrap';
  v.textContent = value;
  row.appendChild(v);
  return row;
}
function settingRow(s) {
  const row = document.createElement('div'); row.className = 'row';
  const info = document.createElement('div'); info.className = 'info';
  info.innerHTML = `<div class="name"></div><div class="desc"></div>`;
  info.querySelector('.name').textContent = s.title;
  info.querySelector('.desc').textContent = s.description;
  row.appendChild(info);
  const save = async (value) => {
    await api('/api/settings', { method: 'PATCH', body: JSON.stringify({ [s.key]: value }) });
    // This switch may be the one others depend on: redraw so they appear or go.
    await loadSettings();
  };

  // A colour is picked, not typed — the browser has a real picker for it.
  if (s.key === 'screensaver.clock_color') {
    const [r, g, b] = String(s.value || '250,250,250').split(',').map((n) => +n || 0);
    const hex = '#' + [r, g, b].map((n) => n.toString(16).padStart(2, '0')).join('');
    const inp = document.createElement('input');
    inp.type = 'color'; inp.value = hex;
    inp.style.cssText = 'width:44px; height:32px; padding:2px; background:var(--surface-2);'
      + 'border:1px solid var(--border); border-radius:var(--radius-sm); cursor:pointer';
    inp.addEventListener('change', () => {
      const h = inp.value; // #rrggbb
      const rgb = [1, 3, 5].map((i) => parseInt(h.slice(i, i + 2), 16)).join(',');
      save(rgb);
    });
    row.appendChild(inp);
    return row;
  }

  // The screensaver's media is browsed from Home Assistant, not typed — the
  // same picker the device offers, so the two stay in step.
  if (s.key === 'screensaver.media_id') {
    const val = document.createElement('span');
    val.className = 'device';
    val.style.cssText = 'max-width:45%; overflow:hidden; text-overflow:ellipsis; white-space:nowrap';
    val.textContent = s.value || 'Not set';
    const btn = document.createElement('button');
    btn.className = 'btn-ghost'; btn.textContent = 'Browse';
    btn.addEventListener('click', async () => {
      const picked = await openMediaBrowser();
      if (picked) {
        await api('/api/settings', { method: 'PATCH', body: JSON.stringify({
          'screensaver.media_id': picked.id,
          'screensaver.media_is_folder': picked.isFolder,
        }) });
        await loadSettings();
      }
    });
    // One wrapper so the value + button occupy a single grid cell on mobile.
    const controls = document.createElement('div');
    controls.style.cssText = 'display:flex; gap:8px; align-items:center; min-width:0';
    controls.append(val, btn);
    row.appendChild(controls);
    return row;
  }

  // A time of day gets the browser's native time picker.
  if (s.key === 'ha.theme_dark_at' || s.key === 'ha.theme_light_at') {
    const inp = document.createElement('input');
    inp.type = 'time';
    inp.value = s.value || '';
    inp.style.cssText = 'background:var(--surface-2); border:1px solid var(--border);'
      + 'border-radius:var(--radius-sm); color:var(--text); padding:6px 8px';
    inp.addEventListener('change', () => save(inp.value));
    row.appendChild(inp);
    return row;
  }

  // A bounded number is dragged, not typed — the same slider the device
  // shows. Label updates live; the value saves once, on release.
  if (s.type === 'number' && s.min != null && s.max != null) {
    const label = (v) => s.unit === '%'
      ? `${Math.round(s.max <= 1 ? v * 100 : v)}%`
      : `${v}${s.unit || ''}`;
    const controls = document.createElement('div');
    controls.style.cssText = 'display:flex; align-items:center; gap:10px; min-width:0';
    const inp = document.createElement('input');
    inp.type = 'range';
    inp.min = s.min; inp.max = s.max; inp.step = s.step ?? 'any';
    inp.value = typeof s.value === 'number' ? s.value : s.min;
    inp.style.width = '190px';
    const val = document.createElement('span');
    val.className = 'device';
    val.style.cssText = 'min-width:3.5em; text-align:right; font-variant-numeric:tabular-nums';
    val.textContent = label(+inp.value);
    inp.addEventListener('input', () => (val.textContent = label(+inp.value)));
    inp.addEventListener('change', () => save(Number(inp.value)));
    controls.append(inp, val);
    row.appendChild(controls);
    return row;
  }

  if (s.type === 'boolean') {
    const lbl = document.createElement('label'); lbl.className = 'switch';
    const cb = document.createElement('input'); cb.type = 'checkbox'; cb.checked = !!s.value;
    cb.addEventListener('change', () => save(cb.checked));
    const sl = document.createElement('span'); sl.className = 'slider';
    lbl.append(cb, sl); row.appendChild(lbl);
  } else if (s.type === 'select') {
    const sel = document.createElement('select');
    let opts = s.options || [];
    if (s.key === 'screensaver.mode' && !state.haConfigured)
      opts = opts.filter((o) => o !== 'media');
    opts.forEach((o) => {
      const opt = document.createElement('option'); opt.value = o; opt.textContent = o;
      opt.selected = o === s.value; sel.appendChild(opt);
    });
    sel.addEventListener('change', () => save(sel.value));
    row.appendChild(sel);
  } else {
    const inp = document.createElement('input');
    inp.type = s.type === 'password' ? 'password' : s.type === 'number' ? 'number' : 'text';
    if (s.type === 'password') inp.placeholder = s.value === '__set__' ? '•••••• (set)' : 'Not set';
    else inp.value = (s.type === 'number' && typeof s.value === 'number')
      ? String(s.value)  // JS prints an integer-valued number without a .0
      : (s.value ?? '');
    inp.addEventListener('change', () =>
      save(s.type === 'number' ? Number(inp.value) : inp.value));
    row.appendChild(inp);
  }
  return row;
}

/* ---- Media browser (screensaver) ---- */
// A modal that walks the Home Assistant media tree over haBrowseMedia — the
// same command and the same shape the device's native picker uses. Resolves to
// the chosen media-source id, or null if cancelled.
function openMediaBrowser() {
  return new Promise((resolve) => {
    const trail = [{ id: undefined, title: 'Media' }];

    const back = document.createElement('div');
    back.style.cssText = 'position:fixed; inset:0; background:rgba(0,0,0,.6);'
      + 'display:grid; place-items:center; z-index:1000; padding:16px';
    const card = document.createElement('div');
    card.className = 'card';
    card.style.cssText = 'width:100%; max-width:520px; max-height:80vh;'
      + 'display:flex; flex-direction:column; margin:0';
    back.appendChild(card);
    document.body.appendChild(back);

    const close = (val) => { back.remove(); resolve(val); };
    back.addEventListener('click', (e) => { if (e.target === back) close(null); });

    const crumbs = document.createElement('div');
    crumbs.style.cssText = 'font-size:13px; color:var(--muted); margin-bottom:10px';
    const list = document.createElement('div');
    list.style.cssText = 'overflow:auto; flex:1';
    const foot = document.createElement('div');
    foot.className = 'toolbar'; foot.style.marginTop = '12px';
    card.append(crumbs, list, foot);

    async function open(id, title, push) {
      if (push) trail.push({ id, title });
      crumbs.textContent = trail.map((c) => c.title).join('  ›  ');
      list.innerHTML = '<div class="desc" style="color:var(--muted)">Loading…</div>';
      let node;
      try {
        const r = await cmd('haBrowseMedia', id ? { mediaContentId: id } : {});
        if (!r.ok) throw new Error(r.error || 'browse failed');
        node = r.data;
      } catch (e) {
        list.innerHTML = `<div class="desc" style="color:var(--error)">Could not browse: ${e}</div>`;
        return;
      }
      list.innerHTML = '';
      for (const c of (node.children || [])) {
        const r = document.createElement('div'); r.className = 'row';
        const info = document.createElement('div'); info.className = 'info';
        const isCam = (c.media_content_id || '').startsWith('media-source://camera/');
        info.innerHTML = `<div class="name"></div><div class="desc"></div>`;
        info.querySelector('.name').textContent = c.title;
        info.querySelector('.desc').textContent =
          c.can_expand ? 'folder' : isCam ? 'camera' : (c.media_content_type || 'item');
        r.appendChild(info);
        r.style.cursor = 'pointer';
        r.addEventListener('click', () => {
          if (c.can_expand) open(c.media_content_id, c.title, true);
          else if (c.can_play) close({ id: c.media_content_id, isFolder: false });
        });
        list.appendChild(r);
      }
      if (!node.children || !node.children.length)
        list.innerHTML = '<div class="desc" style="color:var(--muted)">Nothing here.</div>';

      foot.innerHTML = '';
      const cancel = document.createElement('button');
      cancel.className = 'btn-ghost'; cancel.textContent = 'Cancel';
      cancel.addEventListener('click', () => close(null));
      const spacer = document.createElement('span'); spacer.className = 'spacer';
      foot.append(cancel, spacer);
      if (trail.length > 1 && node.can_expand) {
        const useFolder = document.createElement('button');
        useFolder.className = 'btn-ghost'; useFolder.textContent = 'Use this folder';
        useFolder.addEventListener('click', () => close({ id: node.media_content_id, isFolder: true }));
        foot.appendChild(useFolder);
      }
    }
    open(undefined, 'Media', false);
  });
}

/* ---- Console + Logs ---- */
function appendLine(el, level, message, timeMs) {
  const atBottom = el.scrollHeight - el.scrollTop - el.clientHeight < 40;
  const div = document.createElement('div'); div.className = `line ${level}`;
  const ts = new Date(timeMs || Date.now()).toTimeString().slice(0, 8);
  const t = document.createElement('span'); t.className = 'ts'; t.textContent = ts + ' ';
  div.appendChild(t); div.appendChild(document.createTextNode(message));
  el.appendChild(div);
  while (el.childElementCount > 500) el.removeChild(el.firstChild);
  if (atBottom) el.scrollTop = el.scrollHeight;
}
async function loadConsole() {
  const { console: lines } = await (await api('/api/console')).json();
  const el = $('#consoleOut'); el.innerHTML = '';
  (lines || []).forEach((l) => appendLine(el, l.level, l.message, l.time));
}
$('#clearConsole').addEventListener('click', () => {
  cmd('clearConsole'); $('#consoleOut').innerHTML = '';
});
async function loadLogs() {
  const { logs } = await (await api('/api/logs')).json();
  const el = $('#logsOut'); el.innerHTML = '';
  (logs || []).forEach((l) =>
    appendLine(el, l.level, `${l.tag}: ${l.message}`, Date.parse(l.time)));
}
$('#refreshLogs').addEventListener('click', loadLogs);

/* ---- Live state (WebSocket) ---- */
function connectWs() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  const ws = new WebSocket(`${proto}://${location.host}/api/ws?token=${state.token}`);
  state.ws = ws;
  ws.onopen = () => {
    setConn('on');
    ws.send(JSON.stringify({ type: 'subscribe', topics: ['state', 'events', 'console', 'logs'] }));
  };
  ws.onclose = () => { setConn('off'); if (state.token) setTimeout(connectWs, 3000); };
  ws.onmessage = (ev) => {
    const msg = JSON.parse(ev.data);
    if (msg.type === 'state') applyInfo(msg.device, msg.currentUrl);
    else if (msg.type === 'stats') renderStats(msg);
    else if (msg.type === 'console') appendLine($('#consoleOut'), msg.level, msg.message, msg.time);
    else if (msg.type === 'log') appendLine($('#logsOut'), msg.entry.level, `${msg.entry.tag}: ${msg.entry.message}`, Date.parse(msg.entry.time));
    else if (msg.type === 'event' && msg.event === 'screenon') loadScreenshot();
    // The device's own settings screen updates live off the same event; this
    // panel has to as well, or the two disagree about the same device.
    else if (msg.type === 'wakeword-state') loadWakeWord();
    // The screensaver and the card both dim behind our back.
    else if (msg.type === 'brightness') showBrightness(msg.level);
  };
}
function setConn(s) { $('#connDot').className = `dot ${s}`; }
function applyInfo(device, currentUrl) {
  if (!device) return;
  $('#deviceName').textContent = device.name || device.model || '';
  renderStats(device);
  if (currentUrl) $('#currentUrl').textContent = currentUrl;
  if (device.brightness != null) showBrightness(device.brightness);
  state.device = device;
}

// Battery, CPU load and temperature in the header, from either the initial
// state or a live `stats` push. CPU/temp are null on platforms that decline
// (kept hidden rather than shown as a fake 0). Temp warms from muted → amber →
// red so a hot kiosk stands out at a glance.
function setStat(cls, text, color) {
  document.querySelectorAll(cls).forEach((el) => {
    el.textContent = text ?? '';
    el.style.color = color || '';
  });
}
function renderStats(o) {
  if (o.battery != null)
    setStat('.js-batt', `${o.charging ? '⚡' : '🔋'} ${o.battery}%`);
  setStat('.js-cpu', o.cpu != null ? `CPU ${Math.round(o.cpu)}%` : '');
  if (o.temp == null) { setStat('.js-temp', ''); return; }
  const t = Math.round(o.temp);
  setStat('.js-temp', `${t}°C`,
    t >= 80 ? 'var(--error)' : t >= 65 ? 'var(--warn)' : '');
}

// The slider is also a readout. It used to be born at 100 and only ever send,
// so a screensaver dimming the screen to nothing left it sitting at full —
// reporting a number nobody had measured.
function showBrightness(level) {
  const pct = Math.round(level * 100);
  $('#brightness').value = pct;
  $('#brightnessValue').textContent = `${pct}%`;
}

/* ---- Boot ---- */
async function start() {
  $('#login').classList.add('hidden'); $('#app').classList.remove('hidden');
  const info = await (await api('/api/info')).json();
  applyInfo(info, info.currentUrl);
  await loadSettings();
  await loadConsole();
  await loadScreenshot();
  // Whatever the URL asked for, now that the panels it needs exist.
  showTab(location.hash.slice(1) || 'dashboard', { push: false });
  // Auto-refresh is OFF by default: each capture makes the tablet read back
  // and encode its whole WebView, which is visible as a stutter on the device
  // itself. One shot on load is free; a standing timer is not, and an admin
  // tab left open would otherwise poll forever. Tick the box when you want it.
  connectWs();
}
$('#loginBtn').addEventListener('click', login);
$('#password').addEventListener('keydown', (e) => { if (e.key === 'Enter') login(); });
$('#logoutBtn').addEventListener('click', logout);

// Only a real 401 (handled inside api()) logs out. A transient network error
// at boot must NOT — just log it and let the WebSocket reconnect.
if (state.token) start().catch((e) => console.warn('start failed', e));
</script>
